<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مولد الصور بالذكاء الاصطناعي</title>

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

  <style>
    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      background:#081633;
      color:white;
      font-family:'Cairo',sans-serif;
      text-align:center;
      padding:24px 16px 40px;
    }

    .container{
      max-width:820px;
      margin:auto;
    }

    h1{
      margin:0 0 20px;
      font-size:34px;
      line-height:1.5;
    }

    .card{
      background:#0f1e46;
      border-radius:22px;
      padding:18px;
      box-shadow:0 10px 30px rgba(0,0,0,0.25);
      margin-bottom:20px;
    }

    .preview-wrap{
      display:flex;
      justify-content:center;
      margin-bottom:20px;
    }

    .image-frame{
      width:100%;
      max-width:700px;
      aspect-ratio:1/1;
      position:relative;
      overflow:hidden;
      border-radius:18px;
      background:#162552;
      box-shadow:0 0 24px rgba(0,0,0,0.35);
    }

    .image-frame img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .placeholder{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#b9c6f0;
      font-size:18px;
      padding:20px;
    }

    .overlay{
      position:absolute;
      inset:0;
      pointer-events:none;
      display:flex;
      padding:24px;
    }

    .overlay-text{
      max-width:85%;
      color:#fff;
      font-weight:900;
      line-height:1.25;
      text-shadow:
        0 3px 10px rgba(0,0,0,0.8),
        0 0 24px rgba(0,0,0,0.45);
      word-break:break-word;
      white-space:pre-line;
      font-size:42px;
    }

    .top-right{
      justify-content:flex-start;
      align-items:flex-start;
    }

    .top-center{
      justify-content:center;
      align-items:flex-start;
      text-align:center;
    }

    .center{
      justify-content:center;
      align-items:center;
      text-align:center;
    }

    .bottom-right{
      justify-content:flex-start;
      align-items:flex-end;
    }

    .bottom-center{
      justify-content:center;
      align-items:flex-end;
      text-align:center;
    }

    textarea,
    select,
    input{
      width:100%;
      border:none;
      border-radius:16px;
      padding:15px 16px;
      font-size:18px;
      font-family:'Cairo',sans-serif;
      outline:none;
      background:#f2f2f2;
      color:#111;
    }

    textarea{
      min-height:120px;
      resize:vertical;
    }

    .row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin-top:12px;
    }

    button{
      width:100%;
      margin-top:14px;
      padding:15px 18px;
      border:none;
      border-radius:16px;
      background:#3d6df2;
      color:#fff;
      font-size:20px;
      font-family:'Cairo',sans-serif;
      cursor:pointer;
      transition:0.2s ease;
    }

    button:hover{
      background:#2f5ce0;
    }

    .secondary{
      background:#1f9d55;
    }

    .secondary:hover{
      background:#178246;
    }

    .dark{
      background:#202b52;
    }

    .dark:hover{
      background:#182142;
    }

    #timer{
      margin-top:10px;
      font-size:16px;
      color:#c7d2ff;
      min-height:24px;
    }

    #status{
      margin-top:8px;
      font-size:18px;
      min-height:28px;
    }

    .credit-value{
      font-size:34px;
      font-weight:900;
      margin-top:6px;
    }

    .hint{
      color:#b6c2eb;
      font-size:14px;
      margin-top:8px;
    }

    @media (max-width:700px){
      h1{
        font-size:28px;
      }

      .row{
        grid-template-columns:1fr;
      }

      .overlay-text{
        font-size:30px;
      }
    }
  </style>
</head>
<body>

  <div class="container">

    <h1>🎨 مولد الصور بالذكاء الاصطناعي</h1>

    <div class="card">
      <div class="preview-wrap">
        <div class="image-frame" id="frame">
          <img id="result" alt="result" />
          <div class="placeholder" id="placeholder">ستظهر الصورة هنا بعد الإنشاء</div>

          <div class="overlay bottom-center" id="overlay">
            <div class="overlay-text" id="overlayText"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <textarea id="prompt" placeholder="اكتب النص العربي الذي تريد ظهوره داخل الإعلان"></textarea>

      <div class="row">
        <select id="size" onchange="updateFrame()">
          <option value="square">Instagram</option>
          <option value="story">Story / Snapchat</option>
          <option value="banner">Banner</option>
          <option value="clean">صورة بدون قص</option>
        </select>

        <select id="position" onchange="updateOverlayPosition()">
          <option value="bottom-center">النص أسفل وسط</option>
          <option value="top-center">النص أعلى وسط</option>
          <option value="center">النص في الوسط</option>
          <option value="bottom-right">النص أسفل يمين</option>
          <option value="top-right">النص أعلى يمين</option>
        </select>
      </div>

      <div class="row">
        <select id="theme">
          <option value="luxury perfume advertising poster, elegant product photography, cinematic lighting, premium ad design, clean composition, luxury brand aesthetic, realistic, no text, no watermark">عطر فاخر</option>
          <option value="modern fashion advertising poster, stylish editorial photography, elegant composition, premium brand aesthetic, realistic, no text, no watermark">موضة وأزياء</option>
          <option value="luxury cosmetics advertising poster, beauty product campaign, clean premium design, cinematic lighting, realistic, no text, no watermark">منتج تجميلي</option>
          <option value="high-end real estate advertising poster, luxury interior, elegant composition, premium brochure style, realistic, no text, no watermark">عقار فاخر</option>
          <option value="restaurant advertising poster, delicious food presentation, elegant commercial photography, premium branding, realistic, no text, no watermark">مطعم</option>
          <option value="professional marketing poster, elegant commercial layout, premium advertising design, realistic, no text, no watermark">إعلان عام</option>
        </select>

        <select id="fontSize" onchange="updateOverlayStyle()">
          <option value="36">خط متوسط</option>
          <option value="28">خط أصغر</option>
          <option value="48" selected>خط كبير</option>
          <option value="60">خط أكبر</option>
        </select>
      </div>

      <button onclick="generate()">إنشاء الصورة</button>
      <button class="dark" onclick="downloadFinal()">تحميل الصورة النهائية</button>

      <div id="timer"></div>
      <div id="status"></div>
    </div>

    <div class="card">
      <div>الرصيد الحالي</div>
      <div class="credit-value" id="creditsDisplay">--</div>
      <div class="hint">يتم تحديث الرصيد بعد التفعيل أو بعد إنشاء الصورة</div>

      <div style="margin-top:16px;">
        <input id="code" placeholder="أدخل كود الرصيد">
        <button class="secondary" onclick="redeem()">تفعيل الكود</button>
      </div>
    </div>

  </div>

  <script>
    const SERVER_URL = "https://roma919111githubio-production-06fe.up.railway.app";
    const USER_ID = "user1";

    let timerInterval = null;
    let seconds = 0;

    function startTimer(){
      seconds = 0;
      document.getElementById("timer").innerText = "⏱ وقت الإنشاء: 0 ثانية";
      clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        seconds++;
        document.getElementById("timer").innerText = "⏱ وقت الإنشاء: " + seconds + " ثانية";
      }, 1000);
    }

    function stopTimer(){
      clearInterval(timerInterval);
    }

    function updateFrame(){
      const type = document.getElementById("size").value;
      const frame = document.getElementById("frame");

      if(type === "square"){
        frame.style.aspectRatio = "1 / 1";
      } else if(type === "story"){
        frame.style.aspectRatio = "9 / 16";
      } else if(type === "banner"){
        frame.style.aspectRatio = "16 / 9";
      } else {
        frame.style.aspectRatio = "1 / 1";
      }
    }

    function updateOverlayPosition(){
      const overlay = document.getElementById("overlay");
      const position = document.getElementById("position").value;

      overlay.className = "overlay " + position;
    }

    function updateOverlayStyle(){
      const text = document.getElementById("overlayText");
      const size = document.getElementById("fontSize").value;
      text.style.fontSize = size + "px";
    }

    function buildPrompt(arabicText){
      const theme = document.getElementById("theme").value;
      return `${theme}, strong focal subject, visually balanced composition, advertising-quality image`;
    }

    async function loadCredits(){
      try{
        const response = await fetch(`${SERVER_URL}/credits/${encodeURIComponent(USER_ID)}`);
        const data = await response.json();
        document.getElementById("creditsDisplay").innerText =
          typeof data.credits !== "undefined" ? data.credits : "0";
      }catch(error){
        document.getElementById("creditsDisplay").innerText = "--";
      }
    }

    async function redeem(){
      const code = document.getElementById("code").value.trim();
      const status = document.getElementById("status");

      if(!code){
        status.innerText = "أدخل كود الرصيد أولاً";
        return;
      }

      status.innerText = "جاري تفعيل الكود...";

      try{
        const response = await fetch(`${SERVER_URL}/redeem`, {
          method:"POST",
          headers:{ "Content-Type":"application/json" },
          body:JSON.stringify({
            user: USER_ID,
            code: code
          })
        });

        const data = await response.json();

        if(data.error){
          status.innerText = data.error;
          return;
        }

        status.innerText = "تم تفعيل الكود بنجاح";
        document.getElementById("code").value = "";
        await loadCredits();

      }catch(error){
        status.innerText = "خطأ في الاتصال بالسيرفر";
      }
    }

    async function generate(){
      const userText = document.getElementById("prompt").value.trim();
      const status = document.getElementById("status");
      const result = document.getElementById("result");
      const placeholder = document.getElementById("placeholder");
      const overlayText = document.getElementById("overlayText");

      if(!userText){
        status.innerText = "اكتب النص أولاً";
        return;
      }

      updateFrame();
      updateOverlayPosition();
      updateOverlayStyle();

      overlayText.innerText = userText;

      const prompt = buildPrompt(userText);

      startTimer();
      status.innerText = "جاري إنشاء الصورة...";

      try{
        const response = await fetch(`${SERVER_URL}/generate`, {
          method:"POST",
          headers:{ "Content-Type":"application/json" },
          body:JSON.stringify({
            prompt: prompt,
            user: USER_ID
          })
        });

        const data = await response.json();
        stopTimer();

        if(data.error){
          status.innerText = data.error;
          await loadCredits();
          return;
        }

        result.src = data.image;
        placeholder.style.display = "none";
        status.innerText = "تم إنشاء الصورة | الرصيد المتبقي: " + data.credits;
        document.getElementById("creditsDisplay").innerText = data.credits;

      }catch(error){
        stopTimer();
        status.innerText = "حدث خطأ بالاتصال بالسيرفر";
      }
    }

    function downloadFinal(){
      const frame = document.getElementById("frame");
      const img = document.getElementById("result");
      const text = document.getElementById("overlayText");
      const position = document.getElementById("position").value;
      const size = parseInt(document.getElementById("fontSize").value, 10);

      if(!img.src){
        document.getElementById("status").innerText = "أنشئ صورة أولاً";
        return;
      }

      const canvas = document.createElement("canvas");
      const width = frame.clientWidth;
      const height = frame.clientHeight;
      canvas.width = width;
      canvas.height = height;

      const ctx = canvas.getContext("2d");

      const tempImage = new Image();
      tempImage.crossOrigin = "anonymous";
      tempImage.onload = function(){
        const imageRatio = tempImage.width / tempImage.height;
        const frameRatio = width / height;

        let drawWidth, drawHeight, drawX, drawY;

        if(imageRatio > frameRatio){
          drawHeight = height;
          drawWidth = tempImage.width * (height / tempImage.height);
          drawX = (width - drawWidth) / 2;
          drawY = 0;
        } else {
          drawWidth = width;
          drawHeight = tempImage.height * (width / tempImage.width);
          drawX = 0;
          drawY = (height - drawHeight) / 2;
        }

        ctx.drawImage(tempImage, drawX, drawY, drawWidth, drawHeight);

        ctx.fillStyle = "#ffffff";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.font = `900 ${size}px Cairo, sans-serif`;

        ctx.shadowColor = "rgba(0,0,0,0.8)";
        ctx.shadowBlur = 18;
        ctx.shadowOffsetX = 0;
        ctx.shadowOffsetY = 4;

        const lines = wrapText(ctx, text.innerText, width * 0.8);
        let baseY = height / 2;

        if(position === "top-center") baseY = height * 0.18;
        if(position === "center") baseY = height * 0.5;
        if(position === "bottom-center") baseY = height * 0.82;
        if(position === "top-right") baseY = height * 0.18;
        if(position === "bottom-right") baseY = height * 0.82;

        const lineHeight = size * 1.3;
        const startY = baseY - ((lines.length - 1) * lineHeight / 2);

        lines.forEach((line, index) => {
          let x = width / 2;
          if(position === "top-right" || position === "bottom-right"){
            x = width * 0.68;
          }
          ctx.fillText(line, x, startY + index * lineHeight);
        });

        const link = document.createElement("a");
        link.download = "ai-design.png";
        link.href = canvas.toDataURL("image/png");
        link.click();
      };

      tempImage.src = img.src;
    }

    function wrapText(ctx, text, maxWidth){
      const words = text.split(" ");
      const lines = [];
      let line = "";

      for(let n = 0; n < words.length; n++){
        const testLine = line + words[n] + " ";
        const metrics = ctx.measureText(testLine);
        const testWidth = metrics.width;

        if(testWidth > maxWidth && n > 0){
          lines.push(line.trim());
          line = words[n] + " ";
        } else {
          line = testLine;
        }
      }

      lines.push(line.trim());
      return lines;
    }

    updateFrame();
    updateOverlayPosition();
    updateOverlayStyle();
    loadCredits();
  </script>

</body>
</html>
