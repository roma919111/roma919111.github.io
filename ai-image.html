<!DOCTYPE html>
<html lang="ar">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>مولد الصور بالذكاء الاصطناعي</title>

<style>

body{
background:#0b1a3a;
color:white;
font-family:Arial;
text-align:center;
padding:40px;
}

textarea{
width:90%;
max-width:700px;
height:120px;
border-radius:10px;
border:none;
padding:15px;
font-size:18px;
}

button{
margin-top:15px;
padding:12px 25px;
background:#3b82f6;
border:none;
color:white;
font-size:18px;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#2563eb;
}

#status{
margin-top:15px;
font-size:16px;
color:#ddd;
}

img{
margin-top:25px;
max-width:500px;
border-radius:12px;
}

</style>

</head>

<body>

<h2>🎨 مولد الصور بالذكاء الاصطناعي</h2>

<textarea id="prompt" placeholder="اكتب وصف الصورة هنا"></textarea>

<br>

<button onclick="generate()">إنشاء الصورة</button>

<div id="status"></div>

<img id="result"/>

<script>

async function generate(){

const prompt = document.getElementById("prompt").value
const status = document.getElementById("status")
const result = document.getElementById("result")

status.innerText="جاري إنشاء الصورة..."

try{

const response = await fetch(
"https://roma919111githubio-production-06fe.up.railway.app/generate",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
prompt:prompt
})
}
)

const data = await response.json()

const img = data.data[0].url

result.src = img

status.innerText="تم إنشاء الصورة"

}catch(error){

status.innerText="حدث خطأ بالاتصال بالسيرفر"

}

}

</script>

</body>
</html>
