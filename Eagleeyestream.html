<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EagleEyeDigits IPTV</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
margin:0;
}

.header{
background:#020617;
padding:20px;
text-align:center;
font-size:22px;
}

.container{
display:flex;
height:90vh;
}

.categories{
width:25%;
background:#020617;
overflow:auto;
padding:10px;
}

.channels{
width:25%;
background:#020617;
overflow:auto;
padding:10px;
}

.player{
width:50%;
display:flex;
align-items:center;
justify-content:center;
}

.item{
background:#1e293b;
padding:10px;
margin:6px 0;
border-radius:6px;
cursor:pointer;
}

.item:hover{
background:#334155;
}

video{
width:95%;
max-height:80vh;
background:black;
}

</style>
</head>

<body>

<div class="header">
EagleEyeDigits IPTV Player
</div>

<div class="container">

<div class="categories" id="categories"></div>

<div class="channels" id="channels"></div>

<div class="player">
<video id="video" controls autoplay></video>
</div>

</div>

<script>

const server="http://silka.m3um9xplus.org:2052"
const user="40756292371865"
const pass="18994994491762"

const api=server+"/player_api.php?username="+user+"&password="+pass

function loadCategories(){

fetch(api+"&action=get_live_categories")
.then(r=>r.json())
.then(data=>{

let container=document.getElementById("categories")

data.forEach(cat=>{

let div=document.createElement("div")

div.className="item"

div.innerText=cat.category_name

div.onclick=()=>loadChannels(cat.category_id)

container.appendChild(div)

})

})

}

function loadChannels(cat){

fetch(api+"&action=get_live_streams&category_id="+cat)
.then(r=>r.json())
.then(data=>{

let container=document.getElementById("channels")

container.innerHTML=""

data.forEach(ch=>{

let div=document.createElement("div")

div.className="item"

div.innerText=ch.name

div.onclick=()=>play(ch.stream_id)

container.appendChild(div)

})

})

}

function play(id){

let url=server+"/live/"+user+"/"+pass+"/"+id+".m3u8"

let video=document.getElementById("video")

video.src=url

video.play()

}

loadCategories()

</script>

</body>
</html>
