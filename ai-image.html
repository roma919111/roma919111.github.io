<!DOCTYPE html>
<html lang="ar">
<head>

<meta charset="UTF-8">

<title>مولد الإعلانات بالذكاء الاصطناعي</title>

<style>

body{
font-family:'Cairo',sans-serif;
text-align:center;
background:#111;
color:white;
padding:40px;
}

textarea{
width:90%;
max-width:900px;
height:120px;
padding:14px;
margin:10px;
border-radius:8px;
border:none;
font-size:16px;
resize:none;
font-family:'Cairo',sans-serif;
}

button{
padding:12px 25px;
background:#00aaff;
border:none;
color:white;
font-size:16px;
cursor:pointer;
border-radius:6px;
}

#status{
margin-top:15px;
color:#ccc;
min-height:20px;
}

#resultBox{
margin:30px auto;
width:90%;
max-width:700px;
position:relative;
display:none;
}

#result{
width:100%;
border-radius:10px;
}

#overlayText{
position:absolute;
left:50%;
bottom:40px;
transform:translateX(-50%);
color:white;
font-size:48px;
font-weight:700;
text-shadow:2px 2px 15px rgba(0,0,0,0.9);
width:90%;
text-align:center;
}

.creditBox{
margin-top:30px;
padding:20px;
background:#1a1a1a;
border-radius:10px;
}

input{
padding:12px;
width:250px;
border:none;
border-radius:6px;
}

.buyBtn{
display:inline-block;
margin-top:10px;
padding:10px 20px;
background:#28a745;
color:white;
text-decoration:none;
border-radius:6px;
}

</style>
</head>

<body>

<h2>🎨 مولد الإعلانات بالذكاء الاصطناعي</h2>

<textarea id="prompt" placeholder="مثال: اعلان عطر فاخر مع عبارة مستوى من عبق الماضي"></textarea>

<br>

<button id="generateBtn" onclick="generate()">إنشاء الإعلان</button>

<div id="status"></div>

<div id="resultBox">
<img id="result">
<div id="overlayText"></div>
</div>

<div class="creditBox">

<h3>رصيدك الحالي</h3>
<div id="creditsDisplay">0</div>

<br>

<input id="creditCode" placeholder="ادخل كود الرصيد">

<br><br>

<button onclick="activateCode()">تفعيل الرصيد</button>

<br><br>

<a class="buyBtn" href="https://yourstore.salla.sa/product/ai-credits" target="_blank">
شراء رصيد
</a>

</div>

<script>

let credits = Number(localStorage.getItem("credits") || 0)

updateCredits()

function updateCredits(){
document.getElementById("creditsDisplay").innerText = credits
}

setTimeout(()=>{
document.getElementById("creditsDisplay").innerText="***"
},60000)



async function activateCode(){

let code = document.getElementById("creditCode").value.trim()

const res = await fetch(
"https://roma919111githubio-production-06fe.up.railway.app/activate-code",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({code})
}
)

const data = await res.json()

if(!data.success){
alert(data.message)
return
}

credits += data.credits

localStorage.setItem("credits",credits)

updateCredits()

alert("تم إضافة "+data.credits+" رصيد")

}



function startCountdown(seconds){

let time = seconds
const status = document.getElementById("status")
const button = document.getElementById("generateBtn")

button.disabled = true

const timer = setInterval(()=>{

status.textContent = "جاري إنشاء الإعلان... الرجاء الانتظار " + time + " ثانية"

time--

if(time < 0){
clearInterval(timer)
status.textContent = "جاري معالجة الصورة..."
}

},1000)

}



async function generate(){

if(credits <= 0){
alert("رصيدك انتهى")
return
}

const input = document.getElementById("prompt").value.trim()

const result = document.getElementById("result")
const overlayText = document.getElementById("overlayText")
const resultBox = document.getElementById("resultBox")
const button = document.getElementById("generateBtn")

if(!input){
document.getElementById("status").textContent="اكتب وصف الإعلان"
return
}

startCountdown(10)

let prompt=input
let text=""

if(input.includes("عبارة")){

const parts=input.split("عبارة")

prompt=parts[0].trim()
text=parts[1].trim()

}

const aiPrompt = `

professional advertising poster,
${prompt},
cinematic lighting,
premium marketing style,
Arabic calligraphy text saying "${text}",
beautiful Arabic typography

`

resultBox.style.display="none"

try{

const response = await fetch(
"https://roma919111githubio-production-06fe.up.railway.app/generate",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({prompt:aiPrompt})
}
)

const data = await response.json()

console.log(data)

let img = null

if(data.data){

if(data.data[0].url) img = data.data[0].url
else if(data.data[0].image_url) img = data.data[0].image_url
else if(data.data[0]) img = data.data[0]

}

if(!img){
document.getElementById("status").textContent="فشل توليد الصورة"
button.disabled=false
return
}

result.src = img

overlayText.textContent = text

resultBox.style.display="block"

document.getElementById("status").textContent="تم إنشاء الإعلان"

credits--

localStorage.setItem("credits",credits)

updateCredits()

button.disabled=false

}catch(e){

document.getElementById("status").textContent="حدث خطأ بالاتصال بالسيرفر"
button.disabled=false

}

}

</script>

</body>
