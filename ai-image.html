<!DOCTYPE html>
<html lang="ar">
<head>

<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&display=swap" rel="stylesheet">

<title>مولد الإعلانات بالذكاء الاصطناعي</title>

<style>

body{
font-family:'Cairo',sans-serif;
text-align:center;
background:#111;
color:white;
padding:40px;
}

textarea{
width:90%;
max-width:800px;
height:100px;
padding:12px;
margin:10px;
border-radius:8px;
border:none;
font-size:16px;
resize:none;
}

button{
padding:12px 25px;
background:#00aaff;
border:none;
color:white;
font-size:16px;
cursor:pointer;
border-radius:6px;
}

#status{
margin-top:15px;
color:#ccc;
}

img{
margin-top:25px;
max-width:500px;
border-radius:10px;
}

</style>

</head>

<body>

<h2>🎨 مولد الإعلانات بالذكاء الاصطناعي</h2>

<textarea id="prompt" placeholder="مثال: منزل فاخر"></textarea>

<br>

<button onclick="generate()">إنشاء الإعلان</button>

<div id="status"></div>

<img id="result">

<script>

async function generate(){

const prompt = document.getElementById("prompt").value

const status = document.getElementById("status")

const result = document.getElementById("result")

status.textContent="جاري إنشاء الصورة..."

try{

const response = await fetch(
"https://ubio-production-06fe.up.railway.app/generate",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
prompt:prompt
})
}
)

const data = await response.json()

const img = data.data[0].url

result.src = img

status.textContent="تم إنشاء الصورة"

}catch(err){

status.textContent="حدث خطأ بالاتصال بالسيرفر"

}

}

</script>

</body>
</html>
