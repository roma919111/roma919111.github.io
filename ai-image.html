<!DOCTYPE html>
<html lang="ar">

<head>

<meta charset="UTF-8">

<title>مولد الإعلانات بالذكاء الاصطناعي</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Cairo',sans-serif;
text-align:center;
background:#111;
color:white;
padding:40px;
}

input{
width:380px;
padding:12px;
margin:10px;
border-radius:6px;
border:none;
font-family:'Cairo',sans-serif;
}

button{
padding:12px 25px;
background:#00aaff;
border:none;
color:white;
font-size:16px;
cursor:pointer;
border-radius:6px;
font-family:'Cairo',sans-serif;
}

button:hover{
background:#0090cc;
}

#status{
margin-top:15px;
color:#ccc;
min-height:24px;
}

#resultBox{
margin:30px auto;
width:90%;
max-width:700px;
position:relative;
display:none;
}

#result{
width:100%;
border-radius:10px;
}

#overlayText{
position:absolute;
left:50%;
bottom:30px;
transform:translateX(-50%);
color:white;
font-size:48px;
font-weight:700;
font-family:'Cairo',sans-serif;
text-shadow:3px 3px 12px rgba(0,0,0,0.9);
width:90%;
text-align:center;
pointer-events:none;
}

</style>

</head>


<body>

<h2>🎨 مولد الإعلانات بالذكاء الاصطناعي</h2>

<input id="prompt" placeholder="مثال: مطبخ فاخر مع عبارة أفضل المطابخ في الخليج">

<br>

<button onclick="generate()">إنشاء الإعلان</button>

<div id="status"></div>

<div id="resultBox">

<img id="result">

<div id="overlayText"></div>

</div>


<script>

async function generate(){

const input=document.getElementById("prompt").value.trim()

const status=document.getElementById("status")
const result=document.getElementById("result")
const resultBox=document.getElementById("resultBox")
const overlayText=document.getElementById("overlayText")

if(!input){
status.textContent="اكتب وصف الإعلان"
return
}

let prompt=input
let text=""

if(input.includes("عبارة")){
const parts=input.split("عبارة")
prompt=parts[0].trim()
text=parts[1].trim()
}

status.textContent="جاري إنشاء الصورة..."

resultBox.style.display="none"

try{

const response=await fetch(
"https://roma919111githubio-production-06fe.up.railway.app/generate",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({prompt:prompt})
}
)

const data=await response.json()

console.log(data)

const img=
data?.data?.[0]?.url||
data?.data?.[0]?.image_url||
data?.data?.[0]?.image

if(!img){
status.textContent="فشل توليد الصورة"
return
}

result.src=img

overlayText.textContent=text

resultBox.style.display="block"

status.textContent="تم إنشاء الإعلان"

}catch(error){

console.log(error)

status.textContent="حدث خطأ بالاتصال بالسيرفر"

}

}

</script>


</body>
</html>
