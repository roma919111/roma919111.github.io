<!DOCTYPE html>
<html lang="ar">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>مولد الصور بالذكاء الاصطناعي</title>

<style>

body{
background:#0a1530;
color:white;
font-family:Arial;
text-align:center;
padding:30px;
}

.container{
max-width:800px;
margin:auto;
}

h1{
margin-bottom:25px;
}

.image-box{
width:100%;
height:420px;
background:#111a3f;
border-radius:15px;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

.image-box img{
max-width:100%;
max-height:100%;
}

textarea{
width:100%;
margin-top:25px;
height:120px;
border-radius:12px;
border:none;
padding:15px;
font-size:18px;
}

select{
width:100%;
margin-top:15px;
padding:12px;
border-radius:10px;
border:none;
font-size:16px;
}

button{
margin-top:15px;
padding:14px 30px;
background:#3b82f6;
border:none;
color:white;
font-size:18px;
border-radius:10px;
cursor:pointer;
}

button:hover{
background:#2563eb;
}

#status{
margin-top:15px;
font-size:17px;
color:#ccc;
}

</style>

</head>

<body>

<div class="container">

<h1>🎨 مولد الصور بالذكاء الاصطناعي</h1>

<!-- الصورة -->

<div class="image-box">

<img id="result">

</div>

<!-- الوصف -->

<textarea id="prompt" placeholder="اكتب وصف الصورة هنا"></textarea>

<!-- اختيار المقاس -->

<select id="size">

<option value="1024x1024">Instagram Post</option>

<option value="1080x1920">Instagram Story / Snapchat</option>

<option value="1792x1024">Banner</option>

<option value="1024x1792">Poster</option>

<option value="1280x720">YouTube Thumbnail</option>

</select>

<button onclick="generate()">إنشاء الصورة</button>

<div id="status"></div>

</div>

<script>

async function generate(){

const prompt=document.getElementById("prompt").value
const size=document.getElementById("size").value
const status=document.getElementById("status")
const result=document.getElementById("result")

status.innerText="جاري إنشاء الصورة..."

try{

const response=await fetch(
"https://roma919111githubio-production-06fe.up.railway.app/generate",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
prompt:prompt,
user:"user1",
size:size
})
}
)

const data=await response.json()

if(data.error){

status.innerText=data.error
return

}

result.src=data.image

status.innerText="تم إنشاء الصورة"

}catch(error){

status.innerText="حدث خطأ بالاتصال بالسيرفر"

}

}

</script>

</body>
</html>
