<!DOCTYPE html>
<html lang="ar">

<head>
<meta charset="UTF-8">
<title>مولد الصور العربية</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#111;
color:white;
padding:40px;
}

input{
width:300px;
padding:10px;
margin:10px;
border-radius:6px;
border:none;
}

button{
padding:12px 25px;
background:#00c3ff;
border:none;
color:white;
font-size:16px;
cursor:pointer;
border-radius:6px;
}

button:hover{
background:#0099cc;
}

img{
margin-top:30px;
max-width:90%;
border-radius:10px;
}

</style>
</head>

<body>

<h2>🎨 مولد الصور بالذكاء الاصطناعي</h2>

<input id="prompt" placeholder="اكتب وصف الصورة">

<br>

<input id="text" placeholder="اكتب النص العربي على الصورة">

<br>

<button onclick="generate()">إنشاء الصورة</button>

<br>

<img id="result"/>

<script>

async function generate(){

let prompt = document.getElementById("prompt").value
let text = document.getElementById("text").value

let response = await fetch("https://corsproxy.io/?https://ark.ap-southeast.bytepluses.com/api/v3/images/generations,{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer 048b77d1-38c3-4c88-a805-509a7989baf0"
},
body:JSON.stringify({
model:"seedream-4.5",
prompt:prompt,
size:"1024x1024"
})
})

let data = await response.json()

let img = new Image()

img.crossOrigin="anonymous"

img.src = data.data[0].url

img.onload = function(){

let canvas = document.createElement("canvas")

canvas.width = img.width
canvas.height = img.height

let ctx = canvas.getContext("2d")

ctx.drawImage(img,0,0)

ctx.font="60px Arial"
ctx.fillStyle="white"
ctx.textAlign="center"

ctx.fillText(text,canvas.width/2,canvas.height-80)

let finalImage = canvas.toDataURL()

document.getElementById("result").src = finalImage

}

}

</script>

</body>
</html>
