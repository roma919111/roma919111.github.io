<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>مشغل IPTV</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

body{
font-family:Tahona;
background:#f4f6fb;
text-align:center;
}

input{
width:80%;
padding:10px;
margin:10px;
}

button{
padding:10px 20px;
background:#ff9800;
border:none;
color:white;
cursor:pointer;
}

#channels{
margin-top:20px;
}

.channel{
padding:10px;
border-bottom:1px solid #ddd;
cursor:pointer;
}

video{
width:80%;
margin-top:20px;
}

</style>
</head>

<body>

<h2>مشغل IPTV</h2>

<input type="text" id="m3uUrl" placeholder="ضع رابط playlist m3u">

<br>

<button onclick="loadPlaylist()">تحميل القنوات</button>

<div id="channels"></div>

<video id="video" controls></video>

<script>

function loadPlaylist(){

let url=document.getElementById("m3uUrl").value;

fetch(url)
.then(res=>res.text())
.then(data=>parseM3U(data));

}

function parseM3U(data){

let lines=data.split("\n");

let channels=document.getElementById("channels");

channels.innerHTML="";

for(let i=0;i<lines.length;i++){

if(lines[i].includes("#EXTINF")){

let name=lines[i].split(",")[1];

let link=lines[i+1];

let div=document.createElement("div");

div.className="channel";

div.innerText=name;

div.onclick=function(){

playChannel(link);

};

channels.appendChild(div);

}

}

}

function playChannel(url){

let video=document.getElementById("video");

if(Hls.isSupported()){

let hls=new Hls();

hls.loadSource(url);

hls.attachMedia(video);

}

else{

video.src=url;

}

}

</script>

</body>
</html>
