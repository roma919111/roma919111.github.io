<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EagleEyeDigits IPTV Player</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
margin:0;
padding:0;
}

.header{
padding:20px;
text-align:center;
font-size:24px;
font-weight:bold;
background:#020617;
}

.container{
display:flex;
height:90vh;
}

.channels{
width:35%;
overflow:auto;
background:#020617;
padding:10px;
}

.player{
width:65%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

.channel{
padding:10px;
margin:5px 0;
background:#1e293b;
border-radius:6px;
cursor:pointer;
}

.channel:hover{
background:#334155;
}

input{
width:95%;
padding:10px;
margin-bottom:10px;
border-radius:6px;
border:none;
}

video{
width:90%;
max-height:70vh;
background:black;
}

</style>
</head>

<body>

<div class="header">
EagleEyeDigits IPTV Player
</div>

<div class="container">

<div class="channels">

<input id="playlist" placeholder="ضع رابط m3u هنا">

<button onclick="loadPlaylist()">تحميل</button>

<input id="search" placeholder="بحث عن قناة">

<div id="channelList"></div>

</div>

<div class="player">

<video id="video" controls autoplay></video>

</div>

</div>

<script>

let channels=[]
let hls

function loadPlaylist(){

let url=document.getElementById("playlist").value

let proxy="https://muddy-lab-a457.maq9801.workers.dev/?url="+encodeURIComponent(url)

fetch(proxy)
.then(r=>r.text())
.then(data=>{

let lines=data.split("\n")

for(let i=0;i<lines.length;i++){

if(lines[i].startsWith("#EXTINF")){

let name=lines[i].split(",")[1]

let link=lines[i+1]

channels.push({name,link})

}

}

renderChannels(channels.slice(0,200))

})

}

function renderChannels(list){

let container=document.getElementById("channelList")

container.innerHTML=""

list.forEach(c=>{

let div=document.createElement("div")

div.className="channel"

div.innerText=c.name

div.onclick=()=>play(c.link)

container.appendChild(div)

})

}

function play(url){

let video=document.getElementById("video")

if(Hls.isSupported()){

if(hls)hls.destroy()

hls=new Hls()

hls.loadSource(url)

hls.attachMedia(video)

}else{

video.src=url

}

}

document.getElementById("search").oninput=function(){

let q=this.value.toLowerCase()

let filtered=channels.filter(c=>c.name.toLowerCase().includes(q))

renderChannels(filtered.slice(0,200))

}

</script>

</body>
</html>
