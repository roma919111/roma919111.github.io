<!DOCTYPE html>
<html lang="ar">
<head>

<meta charset="UTF-8">
<title>EagleEyeDigits IPTV</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

body{
background:#0b1a33;
font-family:Arial;
margin:0;
color:white;
}

.header{
background:#081326;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.login{
padding:15px;
text-align:center;
}

input{
width:90%;
max-width:500px;
padding:10px;
margin:5px;
border-radius:5px;
border:none;
}

button{
padding:10px;
width:90%;
max-width:500px;
background:#3fbf5f;
border:none;
color:white;
font-size:16px;
border-radius:5px;
cursor:pointer;
}

.container{
display:flex;
height:80vh;
}

.channels{
width:30%;
overflow:auto;
background:#0f2344;
}

.player{
width:70%;
padding:10px;
}

.channel{
padding:10px;
border-bottom:1px solid #1c3c6b;
cursor:pointer;
}

.channel:hover{
background:#1c3c6b;
}

video{
width:100%;
height:60vh;
background:black;
}

</style>

</head>

<body>

<div class="header">
EagleEyeDigits IPTV
</div>

<div class="login">

<input id="server" placeholder="Server مثال: http://example.com:8080">

<br>

<input id="username" placeholder="Username">

<br>

<input id="password" placeholder="Password">

<br>

<button onclick="loadChannels()">تحميل القنوات</button>

</div>

<div class="container">

<div class="channels" id="channelList"></div>

<div class="player">
<video id="video" controls autoplay></video>
</div>

</div>

<script>

let server=""
let username=""
let password=""
let channels=[]

function loadChannels(){

server=document.getElementById("server").value
username=document.getElementById("username").value
password=document.getElementById("password").value

let proxy="https://muddy-lab-a457.maq9801.workers.dev/?url="

let api = proxy + encodeURIComponent(
server + "/player_api.php?username=" + username + "&password=" + password + "&action=get_live_streams"
)

fetch(api)
.then(response=>response.json())
.then(data=>{

channels=data
displayChannels(data)

})

}

function displayChannels(list){

let box=document.getElementById("channelList")

box.innerHTML=""

list.slice(0,300).forEach(function(ch){

let div=document.createElement("div")

div.className="channel"

div.innerText=ch.name

div.onclick=function(){

playChannel(ch.stream_id)

}

box.appendChild(div)

})

}

function playChannel(id){

let video=document.getElementById("video")

let url = server + "/live/" + username + "/" + password + "/" + id + ".m3u8"

if(Hls.isSupported()){

let hls=new Hls()

hls.loadSource(url)

hls.attachMedia(video)

}else{

video.src=url

}

}

</script>

</body>
</html>
