<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>مشغل IPTV</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{
font-family:Arial;
text-align:center;
background:#f5f5f5;
}

video{
width:90%;
max-width:800px;
margin-top:20px;
}

select{
padding:10px;
font-size:16px;
margin-top:10px;
}

input{
margin-top:20px;
}
</style>

</head>

<body>

<h2>مشغل IPTV</h2>

<input type="file" id="fileInput" accept=".m3u">

<br>

<select id="channels"></select>

<br>

<video id="video" controls autoplay></video>

<script>

document.getElementById("fileInput").addEventListener("change", function(){

let file = this.files[0];

let reader = new FileReader();

reader.onload = function(e){

let text = e.target.result;

loadM3U(text);

};

reader.readAsText(file);

});

function loadM3U(data){

let lines = data.split("\n");

let select = document.getElementById("channels");

select.innerHTML="";

for(let i=0;i<lines.length;i++){

if(lines[i].startsWith("#EXTINF")){

let name = lines[i].split(",")[1];

let url = lines[i+1];

let option = document.createElement("option");

option.value = url.trim();

option.text = name;

select.appendChild(option);

}

}

play(select.value);

}

document.getElementById("channels").onchange=function(){

play(this.value);

}

function play(url){

let video=document.getElementById("video");

if(Hls.isSupported()){

let hls=new Hls();

hls.loadSource(url);

hls.attachMedia(video);

}else{

video.src=url;

}

}

</script>

</body>
</html>
