<!DOCTYPE html>
<html lang="ar">
<head>

<meta charset="UTF-8">

<title>مولد الإعلانات بالذكاء الاصطناعي</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
}

textarea{
width:90%;
max-width:700px;
height:120px;
border-radius:8px;
border:none;
padding:10px;
font-size:16px;
}

button{
margin-top:10px;
padding:10px 25px;
background:#3b82f6;
border:none;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

#status{
margin-top:15px;
color:#ccc;
}

img{
margin-top:20px;
max-width:500px;
border-radius:10px;
}

</style>

</head>

<body>

<h2>🎨 مولد الإعلانات بالذكاء الاصطناعي</h2>

<textarea id="prompt" placeholder="مثال: منزل فاخر مع عبارة مرحباً بكم"></textarea>

<br>

<button onclick="generate()">إنشاء الإعلان</button>

<div id="status"></div>

<img id="result"/>

<script>

async function generate(){

const prompt = document.getElementById("prompt").value
const status = document.getElementById("status")
const result = document.getElementById("result")

status.innerText="جاري إنشاء الصورة..."

try{

const response = await fetch(
"https://roma919111githubio-production-06fe.up.railway.app",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
prompt:prompt
})
}
)

const data = await response.json()

if(data.image){

result.src = data.image
status.innerText="تم إنشاء الصورة"

}else{

status.innerText="لم يتم توليد الصورة"

}

}catch(error){

status.innerText="حدث خطأ بالاتصال بالسيرفر"

}

}

</script>

</body>
</html>
