<!DOCTYPE html>
<html lang="ar">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>EagleEyeDigits IPTV</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}

header{
background:#020617;
padding:15px;
font-size:22px;
}

#search{
width:90%;
padding:10px;
margin:10px;
border-radius:6px;
border:none;
}

#channels{
max-height:300px;
overflow:auto;
padding:10px;
}

.channel{
background:#1e293b;
padding:10px;
margin:6px;
border-radius:6px;
cursor:pointer;
}

.channel:hover{
background:#334155;
}

video{
width:95%;
margin-top:10px;
background:black;
}

</style>

</head>

<body>

<header>EagleEyeDigits IPTV</header>

<input id="search" placeholder="بحث عن قناة">

<div id="channels">
جاري تحميل القنوات...
</div>

<video id="video" controls autoplay></video>

<script>

const server="http://silka.m3um9xplus.org:2052"
const user="40756292371865"
const pass="18994994491762"

const api=server+"/player_api.php?username="+user+"&password="+pass+"&action=get_live_streams"

let allChannels=[]

fetch(api)
.then(r=>r.json())
.then(data=>{

allChannels=data

render(data)

})

function render(list){

let box=document.getElementById("channels")

box.innerHTML=""

list.slice(0,200).forEach(ch=>{

let div=document.createElement("div")

div.className="channel"

div.innerText=ch.name

div.onclick=()=>play(ch.stream_id)

box.appendChild(div)

})

}

function play(id){

let video=document.getElementById("video")

let url=server+"/live/"+user+"/"+pass+"/"+id+".m3u8"

if(Hls.isSupported()){

let hls=new Hls()

hls.loadSource(url)

hls.attachMedia(video)

}else{

video.src=url

}

}

document.getElementById("search").oninput=function(){

let q=this.value.toLowerCase()

let filtered=allChannels.filter(c=>c.name.toLowerCase().includes(q))

render(filtered)

}

</script>

</body>
</html>
