<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<title>AI Banner Generator</title>

<style>

body{
font-family:Arial;
background:#0b1a33;
color:white;
text-align:center;
padding:40px
}

textarea{
width:600px;
height:120px;
padding:10px;
font-size:16px;
border-radius:8px;
border:none
}

button{
margin-top:10px;
padding:12px 25px;
font-size:16px;
background:#4caf50;
color:white;
border:none;
border-radius:8px;
cursor:pointer
}

img{
margin-top:30px;
max-width:700px;
border-radius:10px
}

</style>

</head>

<body>

<h2>AI Arabic Banner Generator</h2>

<p>اكتب وصف التصميم والنص العربي</p>

<textarea id="prompt">

خلفية: اعلان مطعم بيتزا حديث
العنوان: أفضل بيتزا في المدينة
السعر: 25 ريال

</textarea>

<br>

<button onclick="generate()">Generate</button>

<br>

<img id="result">

<script>

async function generate(){

let prompt=document.getElementById("prompt").value

let res=await fetch("/generate",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
prompt:prompt
})

})

let data=await res.json()

if(data.image){

document.getElementById("result").src=data.image

}else{

alert("حدث خطأ")

}

}

</script>

</body>

</html>
