<!DOCTYPE html>
<html lang="ar">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>مولد الصور بالذكاء الاصطناعي</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>

body{
background:#081633;
color:white;
font-family:'Cairo',sans-serif;
text-align:center;
padding:25px;
}

.container{
max-width:700px;
margin:auto;
}

.frame{
position:relative;
width:100%;
aspect-ratio:1/1;
overflow:hidden;
border-radius:15px;
background:#111;
margin-bottom:25px;
}

.frame img{
width:100%;
height:100%;
object-fit:cover;
}

.overlay{
position:absolute;
width:100%;
text-align:center;
padding:40px;
}

#title{

font-weight:900;
font-size:64px;
color:white;

text-shadow:
0 4px 12px rgba(0,0,0,0.8),
0 0 20px rgba(0,0,0,0.4);

-webkit-text-stroke:1px rgba(0,0,0,0.3);

margin-bottom:10px;

}

#subtitle{

font-weight:700;
font-size:32px;
color:white;

text-shadow:0 3px 8px rgba(0,0,0,0.8);

}

.top{ top:40px }
.center{ top:50%; transform:translateY(-50%) }
.bottom{ bottom:40px }

textarea{
width:100%;
border:none;
border-radius:12px;
padding:20px;
font-size:20px;
margin-top:10px;
height:160px;
}

select,input{
width:100%;
border:none;
border-radius:10px;
padding:14px;
font-size:18px;
margin-top:10px;
}

button{
margin-top:15px;
padding:14px;
background:#3b82f6;
border:none;
color:white;
font-size:18px;
border-radius:10px;
cursor:pointer;
width:100%;
}

#timer{margin-top:10px}
#status{margin-top:10px}

</style>

</head>

<body>

<div class="container">

<h1>🎨 مولد الصور بالذكاء الاصطناعي</h1>

<div class="frame" id="frame">

<img id="result">

<div id="overlay" class="overlay bottom">

<div id="title"></div>
<div id="subtitle"></div>

</div>

</div>

<textarea id="prompt" placeholder="اكتب بهذا الشكل:

عطر فاخر
ثبات يدوم طوال اليوم"></textarea>

<select id="size">

<option value="square">Instagram مربع</option>
<option value="story">Story / Snapchat</option>
<option value="banner">Banner</option>

</select>

<select id="position">

<option value="bottom">النص أسفل</option>
<option value="center">النص وسط</option>
<option value="top">النص أعلى</option>

</select>

<button onclick="generate()">إنشاء الصورة</button>

<div id="timer"></div>
<div id="status"></div>

<button onclick="download()">تحميل الصورة</button>

<hr style="margin:40px 0">

<h3>تفعيل كود الرصيد</h3>

<input id="code" placeholder="أدخل كود الرصيد">

<button onclick="redeem()">تفعيل الكود</button>

<div id="credits"></div>

</div>

<script>

const user="user1"

let timerInterval
let seconds=0

function startTimer(){

seconds=0

timerInterval=setInterval(()=>{

seconds++

document.getElementById("timer").innerText="⏱ وقت الإنشاء: "+seconds+" ثانية"

},1000)

}

function stopTimer(){

clearInterval(timerInterval)

}

function updateFrame(){

const type=document.getElementById("size").value
const frame=document.getElementById("frame")

if(type==="square") frame.style.aspectRatio="1/1"
if(type==="story") frame.style.aspectRatio="9/16"
if(type==="banner") frame.style.aspectRatio="16/9"

}

function updateOverlay(){

const pos=document.getElementById("position").value
const overlay=document.getElementById("overlay")

overlay.className="overlay "+pos

}

async function generate(){

updateFrame()
updateOverlay()

const promptFull=document.getElementById("prompt").value

const lines=promptFull.split("\n")

const description=lines[0] || ""
const title=lines[1] || ""
const subtitle=lines[2] || ""

document.getElementById("title").innerText=title
document.getElementById("subtitle").innerText=subtitle

const status=document.getElementById("status")
const result=document.getElementById("result")

startTimer()

status.innerText="جاري إنشاء الصورة..."

try{

const response=await fetch(
"https://roma919111githubio-production-06fe.up.railway.app/generate",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
prompt:description,
user:user
})
}
)

const data=await response.json()

stopTimer()

if(data.error){

status.innerText=data.error
return

}

result.src=data.image

status.innerText="تم إنشاء الصورة | الرصيد المتبقي: "+data.credits

document.getElementById("credits").innerText="الرصيد الحالي: "+data.credits

}catch(error){

stopTimer()

status.innerText="خطأ في الاتصال بالسيرفر"

}

}

async function redeem(){

const code=document.getElementById("code").value
const status=document.getElementById("status")

status.innerText="جاري تفعيل الكود..."

try{

const response=await fetch(
"https://roma919111githubio-production-06fe.up.railway.app/redeem",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
user:user,
code:code
})
}
)

const data=await response.json()

if(data.error){

status.innerText=data.error
return

}

document.getElementById("credits").innerText="الرصيد الحالي: "+data.credits

status.innerText="تم تفعيل الكود"

}catch(error){

status.innerText="خطأ في الاتصال بالسيرفر"

}

}

function download(){

const frame=document.getElementById("frame")
const img=document.getElementById("result")

const canvas=document.createElement("canvas")

canvas.width=frame.clientWidth
canvas.height=frame.clientHeight

const ctx=canvas.getContext("2d")

const image=new Image()

image.crossOrigin="anonymous"

image.onload=function(){

ctx.drawImage(image,0,0,canvas.width,canvas.height)

ctx.fillStyle="white"
ctx.font="bold 48px Cairo"
ctx.textAlign="center"

ctx.fillText(document.getElementById("title").innerText,canvas.width/2,canvas.height-100)

ctx.font="bold 28px Cairo"

ctx.fillText(document.getElementById("subtitle").innerText,canvas.width/2,canvas.height-60)

const link=document.createElement("a")

link.download="ai-ad.png"
link.href=canvas.toDataURL()

link.click()

}

image.src=img.src

}

</script>

</body>
</html>
