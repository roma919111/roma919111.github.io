<!DOCTYPE html>
<html lang="ar">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>مولد الصور بالذكاء الاصطناعي</title>

<style>

body{
background:#081633;
color:white;
font-family:Arial;
text-align:center;
padding:30px;
}

.container{
max-width:700px;
margin:auto;
}

h1{
margin-bottom:25px;
}

textarea{
width:100%;
height:120px;
border-radius:12px;
border:none;
padding:15px;
font-size:18px;
}

select{
width:100%;
padding:12px;
border-radius:10px;
border:none;
font-size:16px;
margin-top:10px;
}

button{
margin-top:15px;
padding:12px 25px;
background:#3b82f6;
border:none;
color:white;
font-size:18px;
border-radius:10px;
cursor:pointer;
}

button:hover{
background:#2563eb;
}

.input-code{
margin-top:20px;
}

input{
width:60%;
padding:12px;
border-radius:8px;
border:none;
font-size:16px;
}

#status{
margin-top:15px;
font-size:18px;
}

#timer{
margin-top:10px;
font-size:16px;
color:#ccc;
}

img{
margin-top:25px;
max-width:100%;
border-radius:15px;
box-shadow:0 0 20px rgba(0,0,0,0.5);
}

</style>

</head>

<body>

<div class="container">

<h1>🎨 مولد الصور بالذكاء الاصطناعي</h1>

<textarea id="prompt" placeholder="اكتب وصف الصورة هنا"></textarea>

<select id="size">

<option value="2K">جودة عالية (2K)</option>

<option value="1024x1024">Instagram</option>

<option value="1024x1792">Story / Snapchat</option>

<option value="1792x1024">Banner</option>

</select>

<br>

<button onclick="generate()">إنشاء الصورة</button>

<div id="timer"></div>

<div id="status"></div>

<img id="result"/>

<div class="input-code">

<h3>تفعيل كود الرصيد</h3>

<input id="code" placeholder="أدخل كود الرصيد">

<button onclick="redeem()">تفعيل الكود</button>

</div>

</div>

<script>

const user="user1"

let timerInterval
let seconds=0


function startTimer(){

seconds=0

timerInterval=setInterval(()=>{

seconds++

document.getElementById("timer").innerText="⏱ وقت الإنشاء: "+seconds+" ثانية"

},1000)

}


function stopTimer(){

clearInterval(timerInterval)

}



async function generate(){

const prompt=document.getElementById("prompt").value
const size=document.getElementById("size").value
const status=document.getElementById("status")
const result=document.getElementById("result")

startTimer()

status.innerText="جاري إنشاء الصورة..."

try{

const response=await fetch(
"https://roma919111githubio-production-06fe.up.railway.app/generate",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
prompt:prompt,
user:user,
size:size
})
}
)

const data=await response.json()

stopTimer()

if(data.error){

status.innerText=data.error
return

}

result.src=data.image

status.innerText="تم إنشاء الصورة | الرصيد المتبقي: "+data.credits

}catch(error){

stopTimer()

status.innerText="حدث خطأ بالاتصال بالسيرفر"

}

}



async function redeem(){

const code=document.getElementById("code").value
const status=document.getElementById("status")

status.innerText="جاري تفعيل الكود..."

try{

const response=await fetch(
"https://roma919111githubio-production-06fe.up.railway.app/redeem",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
user:user,
code:code
})
}
)

const data=await response.json()

if(data.error){

status.innerText=data.error
return

}

status.innerText="تم إضافة الرصيد: "+data.credits

}catch(error){

status.innerText="خطأ في الاتصال بالسيرفر"

}

}

</script>

</body>
</html>
