<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EagleEye Downloader</title>

<style>

body{
margin:0;
background:#0b1a33;
font-family:Arial;
color:white;
display:flex;
align-items:center;
justify-content:center;
height:100vh
}

.box{
background:#12264a;
width:320px;
padding:30px;
border-radius:14px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,.3)
}

input{
width:100%;
padding:14px;
border:none;
border-radius:10px;
font-size:18px;
margin-top:10px;
text-align:center
}

button{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:10px;
background:#4caf50;
color:white;
font-size:18px;
cursor:pointer
}

.msg{
margin-top:12px;
min-height:20px;
font-size:14px;
color:#ffd166
}

</style>

</head>

<body>

<div class="box">

<h2>أدخل كود التحميل</h2>

<input id="codeInput" placeholder="اكتب الكود">

<button onclick="startDownload()">تحميل</button>

<div class="msg" id="msg"></div>

</div>

<script>

const files = {

"919111":"https://github.com/roma919111/roma919111.github.io/releases/download/V1/Max-TV-Pro-active.1.1.apk",

"919123":"https://github.com/roma919111/roma919111.github.io/releases/download/V1/MYHD-MAX.1.apk",

"555777":"https://example.com/app3.apk"

}

function startDownload(){

const code=document.getElementById("codeInput").value.trim()

const msg=document.getElementById("msg")

if(!files[code]){

msg.textContent="الكود غير صحيح"

return

}

msg.textContent="جارٍ بدء التحميل..."

window.location.href=files[code]

}

</script>

</body>
</html>
