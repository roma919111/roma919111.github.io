<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>مشغل IPTV</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{
font-family:Arial;
text-align:center;
background:#f5f5f5;
}

video{
width:80%;
max-width:800px;
margin-top:20px;
}

select{
padding:10px;
font-size:16px;
}
</style>

</head>

<body>

<h2>مشغل القنوات</h2>

<select id="channels"></select>

<br><br>

<video id="video" controls autoplay></video>

<script>

let playlist = `
#EXTM3U
#EXTINF:-1,Channel 1
https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8
#EXTINF:-1,Channel 2
https://test-streams.mux.dev/test_001/stream.m3u8
`;

let lines = playlist.split("\n");
let select = document.getElementById("channels");

for(let i=0;i<lines.length;i++){
if(lines[i].startsWith("#EXTINF")){
let name = lines[i].split(",")[1];
let url = lines[i+1];

let option = document.createElement("option");
option.value = url;
option.text = name;

select.appendChild(option);
}
}

select.onchange = function(){
play(this.value);
}

function play(url){
let video = document.getElementById("video");

if(Hls.isSupported()){
let hls = new Hls();
hls.loadSource(url);
hls.attachMedia(video);
}else{
video.src = url;
}
}

play(select.value);

</script>

</body>
</html>
