<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>مولد الصور بالذكاء الاصطناعي</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
background:#081633;
color:white;
font-family:'Cairo',sans-serif;
text-align:center;
padding:30px;
}

.container{
max-width:750px;
margin:auto;
}

h1{
margin-bottom:20px;
}

.image-box{
margin-bottom:25px;
display:flex;
justify-content:center;
}

.image-frame{
width:100%;
max-width:700px;
aspect-ratio:1/1;
overflow:hidden;
border-radius:15px;
box-shadow:0 0 20px rgba(0,0,0,0.5);
background:#000;
}

.image-frame img{
width:100%;
height:100%;
object-fit:cover;
}

textarea{
width:100%;
height:120px;
border-radius:12px;
border:none;
padding:15px;
font-size:18px;
font-family:'Cairo',sans-serif;
}

select{
width:100%;
margin-top:10px;
padding:12px;
border-radius:10px;
border:none;
font-size:16px;
font-family:'Cairo',sans-serif;
}

button{
margin-top:15px;
padding:14px;
background:#3b82f6;
border:none;
color:white;
font-size:18px;
border-radius:10px;
cursor:pointer;
width:100%;
}

button:hover{
background:#2563eb;
}

#timer{
margin-top:10px;
font-size:16px;
color:#ccc;
}

#status{
margin-top:10px;
font-size:18px;
}

.input-code{
margin-top:40px;
}

input{
width:60%;
padding:12px;
border-radius:8px;
border:none;
font-size:16px;
font-family:'Cairo',sans-serif;
}

</style>

</head>

<body>

<div class="container">

<h1>🎨 مولد الصور بالذكاء الاصطناعي</h1>

<div class="image-box">
<div class="image-frame" id="frame">
<img id="result">
</div>
</div>

<textarea id="prompt" placeholder="اكتب وصف الصورة هنا"></textarea>

<select id="size">
<option value="2k">جودة عالية (2K)</option>
<option value="square">Instagram</option>
<option value="story">Story / Snapchat</option>
<option value="banner">Banner</option>
</select>

<button onclick="generate()">إنشاء الصورة</button>

<div id="timer"></div>
<div id="status"></div>

<div class="input-code">

<h3>تفعيل كود الرصيد</h3>

<input id="code" placeholder="أدخل كود الرصيد">
<br>
<button onclick="redeem()">تفعيل الكود</button>

</div>

</div>

<script>

const user="user1"

let timerInterval
let seconds=0

function startTimer(){

seconds=0

timerInterval=setInterval(()=>{

seconds++

document.getElementById("timer").innerText="⏱ وقت الإنشاء: "+seconds+" ثانية"

},1000)

}

function stopTimer(){
clearInterval(timerInterval)
}

function setFrame(){

const type=document.getElementById("size").value
const frame=document.getElementById("frame")

if(type==="square"){
frame.style.aspectRatio="1/1"
}

else if(type==="story"){
frame.style.aspectRatio="9/16"
}

else if(type==="banner"){
frame.style.aspectRatio="16/9"
}

else{
frame.style.aspectRatio="1/1"
}

}

async function generate(){

const prompt=document.getElementById("prompt").value.trim()
const status=document.getElementById("status")
const result=document.getElementById("result")

if(prompt===""){
status.innerText="اكتب وصف الصورة أولاً"
return
}

setFrame()

startTimer()

status.innerText="جاري إنشاء الصورة..."

result.src=""

try{

const response=await fetch(
"https://roma919111githubio-production-06fe.up.railway.app/generate",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
prompt:prompt,
user:user
})
}
)

const data=await response.json()

stopTimer()

if(data.error){
status.innerText=data.error
return
}

result.src=data.image

status.innerText="تم إنشاء الصورة | الرصيد المتبقي: "+data.credits

}

catch(error){

stopTimer()

status.innerText="حدث خطأ بالاتصال بالسيرفر"

}

}

async function redeem(){

const code=document.getElementById("code").value.trim()
const status=document.getElementById("status")

if(code===""){
status.innerText="أدخل الكود أولاً"
return
}

status.innerText="جاري تفعيل الكود..."

try{

const response=await fetch(
"https://roma919111githubio-production-06fe.up.railway.app/redeem",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
user:user,
code:code
})
}
)

const data=await response.json()

if(data.error){
status.innerText=data.error
return
}

status.innerText="تم إضافة الرصيد: "+data.credits

}

catch(error){

status.innerText="خطأ في الاتصال بالسيرفر"

}

}

</script>

</body>
</html>
