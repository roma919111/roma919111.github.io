<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&display=swap" rel="stylesheet">
<title>مولد الإعلانات بالذكاء الاصطناعي</title>

<style>
body{
font-family:'Cairo',sans-serif;
text-align:center;
background:#111;
color:white;
padding:40px;
}

textarea{
width:90%;
max-width:900px;
height:110px;
padding:14px;
margin:10px;
border-radius:8px;
border:none;
font-size:16px;
resize:none;
font-family:'Cairo',sans-serif;
}

button{
padding:12px 25px;
background:#00aaff;
border:none;
color:white;
font-size:16px;
cursor:pointer;
border-radius:6px;
}

#status{
margin-top:15px;
color:#ccc;
min-height:20px;
}

#resultBox{
margin:30px auto;
width:90%;
max-width:700px;
position:relative;
display:none;
}

#result{
width:100%;
border-radius:10px;
}

#overlayText{
position:absolute;
left:50%;
bottom:40px;
transform:translateX(-50%);
color:white;
font-size:42px;
font-weight:700;
text-shadow:2px 2px 15px rgba(0,0,0,0.9);
width:90%;
text-align:center;
}

.creditBox{
margin-top:30px;
padding:20px;
background:#1a1a1a;
border-radius:10px;
}

input{
padding:12px;
width:250px;
border:none;
border-radius:6px;
}

.buyBtn{
display:inline-block;
margin-top:10px;
padding:10px 20px;
background:#28a745;
color:white;
text-decoration:none;
border-radius:6px;
}
</style>
</head>

<body>

<h2>🎨 مولد الإعلانات بالذكاء الاصطناعي</h2>

<textarea id="prompt" placeholder="مثال: اعلان عطر فاخر مع عبارة مستوى من عبق الماضي"></textarea>

<br>

<button onclick="generate()">إنشاء الإعلان</button>

<div id="status"></div>

<div id="resultBox">
<img id="result">
<div id="overlayText"></div>
</div>

<div class="creditBox">

<h3>رصيدك الحالي</h3>
<div id="creditsDisplay">0</div>

<br>

<input id="creditCode" placeholder="ادخل كود الرصيد">

<br><br>

<button onclick="activateCode()">تفعيل الرصيد</button>

<br><br>

<a class="buyBtn" href="#" target="_blank">
شراء رصيد
</a>

</div>

<script>

let credits = Number(localStorage.getItem("credits") || 0)

updateCredits()

function updateCredits(){
document.getElementById("creditsDisplay").innerText = credits
}

setTimeout(()=>{
document.getElementById("creditsDisplay").innerText="***"
},60000)


// أكواد الرصيد (محلية)

const codes = {
"EAGLE20-A7F3K":20,
"EAGLE100-QW72K":100,
"EAGLE500-LS72K":500
}


function activateCode(){

let code = document.getElementById("creditCode").value.trim()

if(!codes[code]){
alert("الكود غير صحيح")
return
}

credits += codes[code]

localStorage.setItem("credits",credits)

updateCredits()

alert("تم إضافة "+codes[code]+" رصيد")

}



async function generate(){

if(credits <= 0){
alert("رصيدك انتهى")
return
}

const input = document.getElementById("prompt").value.trim()
const result = document.getElementById("result")
const overlayText = document.getElementById("overlayText")
const resultBox = document.getElementById("resultBox")
const status = document.getElementById("status")

if(!input){
status.textContent="اكتب وصف الإعلان"
return
}

status.textContent="جاري إنشاء الصورة..."

let prompt=input
let text=""

if(input.includes("عبارة")){

const parts=input.split("عبارة")

prompt=parts[0].trim()
text=parts[1].trim()

}

const aiPrompt = `
professional advertising poster,
${prompt},
cinematic lighting,
premium marketing style,
Arabic calligraphy text saying "${text}",
beautiful Arabic typography
`

resultBox.style.display="none"

try{

const response = await fetch(
"https://roma919111githubio-production-06fe.up.railway.app/generate",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({prompt:aiPrompt})
}
)

const data = await response.json()

const img = data.data[0].url

result.src = img

overlayText.textContent = text

resultBox.style.display="block"

status.textContent="تم إنشاء الإعلان"

credits--

localStorage.setItem("credits",credits)

updateCredits()

}catch(e){

status.textContent="حدث خطأ بالاتصال بالسيرفر"

}

}

</script>

</body>
</html>
