<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مولد الصور بالذكاء الاصطناعي</title>

  <style>
    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      background:#081633;
      color:#fff;
      font-family:Arial, sans-serif;
      text-align:center;
      padding:24px 16px 40px;
    }

    .container{
      max-width:820px;
      margin:auto;
    }

    h1{
      margin:0 0 22px;
      font-size:42px;
      line-height:1.4;
    }

    .card{
      background:#0f1e46;
      border-radius:22px;
      padding:18px;
      box-shadow:0 10px 30px rgba(0,0,0,0.25);
      margin-bottom:20px;
    }

    .image-box{
      width:100%;
      min-height:280px;
      background:#172557;
      border-radius:18px;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      position:relative;
    }

    .image-box img{
      width:100%;
      height:auto;
      display:none;
      border-radius:18px;
    }

    .image-placeholder{
      color:#aeb8df;
      font-size:18px;
      padding:30px;
    }

    textarea,
    input,
    select{
      width:100%;
      border:none;
      border-radius:16px;
      padding:16px 18px;
      font-size:18px;
      outline:none;
      background:#f2f2f2;
      color:#111;
    }

    textarea{
      min-height:140px;
      resize:vertical;
    }

    .row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
      margin-top:14px;
    }

    .btn{
      width:100%;
      margin-top:14px;
      padding:15px 18px;
      border:none;
      border-radius:16px;
      background:#3d6df2;
      color:#fff;
      font-size:22px;
      cursor:pointer;
      transition:0.2s ease;
    }

    .btn:hover{
      background:#2f5ce0;
    }

    .btn-secondary{
      background:#1f9d55;
    }

    .btn-secondary:hover{
      background:#178246;
    }

    .status{
      margin-top:16px;
      font-size:19px;
      color:#d7defc;
      min-height:28px;
    }

    .timer{
      margin-top:10px;
      font-size:17px;
      color:#aeb8df;
      min-height:24px;
    }

    .credit-box{
      display:grid;
      gap:14px;
    }

    .credit-value{
      font-size:34px;
      font-weight:bold;
      color:#fff;
    }

    .credit-label{
      color:#bfc8eb;
      font-size:18px;
      margin-bottom:4px;
    }

    .section-title{
      font-size:24px;
      margin:0 0 10px;
    }

    .hint{
      color:#aeb8df;
      font-size:15px;
      margin-top:8px;
    }

    @media (max-width:700px){
      h1{
        font-size:28px;
      }

      .row{
        grid-template-columns:1fr;
      }

      .btn{
        font-size:20px;
      }
    }
  </style>
</head>
<body>

  <div class="container">

    <h1>🎨 مولد الصور بالذكاء الاصطناعي</h1>

    <!-- الصورة -->
    <div class="card">
      <div class="image-box">
        <div class="image-placeholder" id="imagePlaceholder">ستظهر الصورة هنا بعد الإنشاء</div>
        <img id="result" alt="Generated image" />
      </div>
    </div>

    <!-- الوصف + المقاسات -->
    <div class="card">
      <textarea id="prompt" placeholder="اكتب وصف الصورة هنا"></textarea>

      <div class="row">
        <select id="size">
          <option value="1024x1024">Instagram Post</option>
          <option value="1080x1920">Instagram Story / Snapchat</option>
          <option value="1792x1024">Banner</option>
          <option value="1024x1792">Poster</option>
          <option value="1280x720">YouTube Thumbnail</option>
        </select>

        <input id="userId" placeholder="اسم المستخدم" value="user1" />
      </div>

      <button class="btn" onclick="generate()">إنشاء الصورة</button>

      <div class="timer" id="timer"></div>
      <div class="status" id="status"></div>
    </div>

    <!-- الرصيد والكوبون -->
    <div class="card credit-box">
      <div>
        <div class="section-title">الرصيد الحالي</div>
        <div class="credit-value" id="creditsDisplay">--</div>
        <div class="hint">يتم تحديث الرصيد بعد التفعيل أو بعد إنشاء الصورة</div>
      </div>

      <input id="couponCode" placeholder="أدخل كود الرصيد" />

      <button class="btn btn-secondary" onclick="redeem()">تفعيل الكوبون</button>
    </div>

  </div>

  <script>
    const SERVER_URL = "https://roma919111githubio-production-06fe.up.railway.app";

    let timerInterval = null;
    let seconds = 0;

    function getUser() {
      const user = document.getElementById("userId").value.trim();
      return user || "user1";
    }

    function startTimer() {
      seconds = 0;
      document.getElementById("timer").innerText = "⏱ وقت الإنشاء: 0 ثانية";
      clearInterval(timerInterval);

      timerInterval = setInterval(() => {
        seconds++;
        document.getElementById("timer").innerText = "⏱ وقت الإنشاء: " + seconds + " ثانية";
      }, 1000);
    }

    function stopTimer() {
      clearInterval(timerInterval);
    }

    async function loadCredits() {
      const user = getUser();

      try {
        const response = await fetch(`${SERVER_URL}/credits/${encodeURIComponent(user)}`);
        const data = await response.json();

        if (typeof data.credits !== "undefined") {
          document.getElementById("creditsDisplay").innerText = data.credits;
        } else {
          document.getElementById("creditsDisplay").innerText = "0";
        }
      } catch (error) {
        document.getElementById("creditsDisplay").innerText = "--";
      }
    }

    async function redeem() {
      const user = getUser();
      const code = document.getElementById("couponCode").value.trim();
      const status = document.getElementById("status");

      if (!code) {
        status.innerText = "أدخل كود الرصيد أولاً";
        return;
      }

      status.innerText = "جاري تفعيل الكوبون...";

      try {
        const response = await fetch(`${SERVER_URL}/redeem`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            user: user,
            code: code
          })
        });

        const data = await response.json();

        if (data.error) {
          status.innerText = data.error;
          return;
        }

        status.innerText = "تم تفعيل الكوبون بنجاح";
        document.getElementById("couponCode").value = "";
        await loadCredits();

      } catch (error) {
        status.innerText = "حدث خطأ بالاتصال بالسيرفر";
      }
    }

    async function generate() {
      const prompt = document.getElementById("prompt").value.trim();
      const size = document.getElementById("size").value;
      const user = getUser();
      const status = document.getElementById("status");
      const result = document.getElementById("result");
      const placeholder = document.getElementById("imagePlaceholder");

      if (!prompt) {
        status.innerText = "اكتب وصف الصورة أولاً";
        return;
      }

      startTimer();
      status.innerText = "جاري إنشاء الصورة...";

      try {
        const response = await fetch(`${SERVER_URL}/generate`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            prompt: prompt,
            user: user,
            size: size
          })
        });

        const data = await response.json();

        stopTimer();

        if (data.error) {
          status.innerText = data.error;
          await loadCredits();
          return;
        }

        result.src = data.image;
        result.style.display = "block";
        placeholder.style.display = "none";

        status.innerText = "تم إنشاء الصورة";
        document.getElementById("creditsDisplay").innerText = data.credits;

      } catch (error) {
        stopTimer();
        status.innerText = "حدث خطأ بالاتصال بالسيرفر";
      }
    }

    loadCredits();
  </script>

</body>
</html>
