<!DOCTYPE html>
<html lang="ar">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>مولد الصور بالذكاء الاصطناعي</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>

body{
background:#081633;
color:white;
font-family:'Cairo',sans-serif;
text-align:center;
padding:30px;
}

.container{
max-width:700px;
margin:auto;
}

h1{
margin-bottom:20px;
}

textarea,input,select{
width:100%;
border:none;
border-radius:12px;
padding:14px;
font-size:18px;
margin-top:10px;
}

button{
margin-top:15px;
padding:12px 25px;
background:#3b82f6;
border:none;
color:white;
font-size:18px;
border-radius:10px;
cursor:pointer;
}

button:hover{
background:#2563eb;
}

#status{
margin-top:15px;
font-size:18px;
}

#timer{
margin-top:10px;
font-size:16px;
color:#ccc;
}

.frame{
position:relative;
margin-top:25px;
width:100%;
aspect-ratio:1/1;
overflow:hidden;
border-radius:15px;
}

.frame img{
width:100%;
height:100%;
object-fit:cover;
}

.overlay{
position:absolute;
width:100%;
text-align:center;
color:white;
font-weight:900;
text-shadow:0 0 15px rgba(0,0,0,0.9);
}

.bottom{
bottom:30px;
}

.center{
top:50%;
transform:translateY(-50%);
}

.top{
top:30px;
}

</style>

</head>

<body>

<div class="container">

<h1>🎨 مولد الصور بالذكاء الاصطناعي</h1>

<input id="description" placeholder="وصف الصورة مثال: luxury perfume advertising">

<textarea id="text" placeholder="النص العربي الذي سيظهر على الصورة"></textarea>

<select id="size">

<option value="square">Instagram مربع</option>
<option value="story">Story / Snapchat</option>
<option value="banner">Banner</option>

</select>

<select id="position">

<option value="bottom">النص أسفل</option>
<option value="center">النص وسط</option>
<option value="top">النص أعلى</option>

</select>

<button onclick="generate()">إنشاء الصورة</button>

<div id="timer"></div>
<div id="status"></div>

<div class="frame" id="frame">

<img id="result">

<div id="overlay" class="overlay bottom">
<span id="overlayText"></span>
</div>

</div>

<br>

<button onclick="download()">تحميل الصورة</button>

</div>

<script>

const user="user1"

let timerInterval
let seconds=0

function startTimer(){

seconds=0

timerInterval=setInterval(()=>{

seconds++

document.getElementById("timer").innerText="⏱ وقت الإنشاء: "+seconds+" ثانية"

},1000)

}

function stopTimer(){

clearInterval(timerInterval)

}

function updateFrame(){

const type=document.getElementById("size").value
const frame=document.getElementById("frame")

if(type==="square") frame.style.aspectRatio="1/1"
if(type==="story") frame.style.aspectRatio="9/16"
if(type==="banner") frame.style.aspectRatio="16/9"

}

function updateOverlay(){

const pos=document.getElementById("position").value
const overlay=document.getElementById("overlay")

overlay.className="overlay "+pos

}

async function generate(){

updateFrame()
updateOverlay()

const description=document.getElementById("description").value
const text=document.getElementById("text").value

const status=document.getElementById("status")
const result=document.getElementById("result")
const overlayText=document.getElementById("overlayText")

overlayText.innerText=text

startTimer()

status.innerText="جاري إنشاء الصورة..."

try{

const response=await fetch(
"https://roma919111githubio-production-06fe.up.railway.app/generate",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
prompt:description,
user:user
})
}
)

const data=await response.json()

stopTimer()

if(data.error){

status.innerText=data.error
return

}

result.src=data.image

status.innerText="تم إنشاء الصورة | الرصيد المتبقي: "+data.credits

}catch(error){

stopTimer()

status.innerText="حدث خطأ بالاتصال بالسيرفر"

}

}

function download(){

const frame=document.getElementById("frame")
const img=document.getElementById("result")
const text=document.getElementById("overlayText")

const canvas=document.createElement("canvas")

canvas.width=frame.clientWidth
canvas.height=frame.clientHeight

const ctx=canvas.getContext("2d")

const image=new Image()

image.crossOrigin="anonymous"

image.onload=function(){

ctx.drawImage(image,0,0,canvas.width,canvas.height)

ctx.fillStyle="white"
ctx.font="bold 40px Cairo"
ctx.textAlign="center"

ctx.fillText(text.innerText,canvas.width/2,canvas.height-40)

const link=document.createElement("a")

link.download="ai-image.png"
link.href=canvas.toDataURL()

link.click()

}

image.src=img.src

}

</script>

</body>
</html>
