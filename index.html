<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>EagleEye Tools</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
font-family:Arial;
text-align:center;
background:#f5f5f5;
padding-top:40px;
}

.container{
background:white;
padding:30px;
border-radius:10px;
width:350px;
margin:auto;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

button{
background:#f0a500;
border:none;
padding:12px 25px;
font-size:18px;
border-radius:8px;
cursor:pointer;
margin-top:20px;
}
</style>

</head>

<body>

<div class="container">

<h2>تحويل الصورة إلى PDF</h2>

<input type="file" id="imageInput" accept="image/*">

<br>

<button onclick="convertImage()">تحويل إلى PDF</button>

</div>

<script>

function convertImage(){

const { jsPDF } = window.jspdf;

let file = document.getElementById("imageInput").files[0];

if(!file){
alert("اختر صورة أولاً");
return;
}

let reader = new FileReader();

reader.onload = function(e){

let img = new Image();

img.onload = function(){

let pdf = new jsPDF();

pdf.addImage(img,'JPEG',10,10,180,160);

pdf.save("image.pdf");

};

img.src = e.target.result;

};

reader.readAsDataURL(file);

}

</script>

</body>
</html>
