<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تنزيل التطبيق</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b1a33;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .box {
      width: 90%;
      max-width: 420px;
      background: #12264a;
      padding: 24px;
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
      text-align: center;
    }

    h1 {
      margin-top: 0;
      font-size: 24px;
    }

    p {
      color: #c9d4e5;
      font-size: 14px;
      margin-bottom: 18px;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      margin-bottom: 12px;
      text-align: center;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #4caf50;
      color: white;
      font-size: 18px;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.95;
    }

    .msg {
      margin-top: 14px;
      min-height: 22px;
      color: #ffd166;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>أدخل كود التحميل</h1>
    <p>اكتب الرقم ثم اضغط تحميل</p>

    <input id="codeInput" type="number" placeholder="مثال: 2606779" />
    <button onclick="startDownload()">تحميل</button>

    <div class="msg" id="msg"></div>
  </div>

  <script>
    // اربط كل رقم برابط APK
    const files = {
      "max2026": "https://github.com/roma919111/roma919111.github.io/releases/download/V1/Max-TV-Pro-active.1.1.apk,
      "1234567": "https://YOUR-DOMAIN.com/files/app2.apk",
      "888999":  "https://YOUR-DOMAIN.com/files/app3.apk"
    };

    function startDownload() {
      const code = document.getElementById("codeInput").value.trim();
      const msg = document.getElementById("msg");

      if (!code) {
        msg.textContent = "أدخل الكود أولاً";
        return;
      }

      if (!files[code]) {
        msg.textContent = "الكود غير صحيح";
        return;
      }

      msg.textContent = "جارٍ بدء التحميل...";

      const a = document.createElement("a");
      a.href = files[code];
      a.download = "";
      document.body.appendChild(a);
      a.click();
      a.remove();
    }
  </script>
</body>
</html>
