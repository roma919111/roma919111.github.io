<style>

}

button{

}

#resultBox{

}

#result{

}

#overlayText{
position:absolute;
left:50%;
bottom:40px;

font-size:48px;
font-weight:700;
text-shadow:2px 2px 15px rgba(0,0,0,0.9);
width:90%;
text-align:center;
pointer-events:none;
}

.creditBox{
margin-top:30px;
padding:20px;
background:#1a1a1a;
border-radius:10px;
}

.buyBtn{
display:inline-block;
margin-top:10px;
padding:10px 20px;
background:#28a745;
color:white;
text-decoration:none;
border-radius:6px;
}

</style>

</head>


<body>

<h2>🎨 مولد الإعلانات بالذكاء الاصطناعي</h2>

<textarea id="prompt" placeholder="مثال: اعلان عطر فاخر مع عبارة مستوى من عبق الماضي"></textarea>

<br>

<button onclick="generate()">إنشاء الإعلان</button>

<div id="status"></div>

<div id="resultBox">

<img id="result">

<div id="overlayText"></div>

</div>

<div class="creditBox">

<h3>رصيدك الحالي</h3>

<div id="creditsDisplay">0</div>

<input id="creditCode" placeholder="أدخل كود الرصيد">

<br>

<button onclick="activateCode()">تفعيل الرصيد</button>

<br>

<a class="buyBtn" href="https://YOUR-SALLA-STORE.com">شراء رصيد</a>

</div>


<script>

let credits = Number(localStorage.getItem("credits") || 0)

updateCredits()

function updateCredits(){

document.getElementById("creditsDisplay").innerText = credits

}

function activateCode(){

let code = document.getElementById("creditCode").value.trim()

if(code=="CRED20"){
credits += 20
}

if(code=="CRED100"){
credits += 100
}

if(code=="CRED500"){
credits += 500
}

localStorage.setItem("credits",credits)

updateCredits()

alert("تم إضافة الرصيد")

}

async function generate(){

if(credits <= 0){

alert("رصيدك انتهى. اشترِ باقة جديدة")

return

}

const input=document.getElementById("prompt").value.trim()

const status=document.getElementById("status")

const result=document.getElementById("result")

const overlayText=document.getElementById("overlayText")

const resultBox=document.getElementById("resultBox")

if(!input){
status.textContent="اكتب وصف الإعلان"
return
}

let prompt=input
let text=""

if(input.includes("عبارة")){

const parts=input.split("عبارة")

prompt=parts[0].trim()

text=parts[1].trim()

}

const aiPrompt=`

professional advertising poster,

${prompt},

cinematic lighting,

premium marketing style,

Arabic calligraphy text saying "${text}",

beautiful Arabic typography

`

status.textContent="جاري إنشاء الإعلان..."

resultBox.style.display="none"

try{

const response=await fetch(

"https://roma919111githubio-production-06fe.up.railway.app/generate",

{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({prompt:aiPrompt})

}

)

const data=await response.json()

const img=

data?.data?.[0]?.url ||

data?.data?.[0]?.image_url ||

data?.data?.[0]?.image

if(!img){

status.textContent="فشل توليد الصورة"

return

}

result.src=img

overlayText.textContent=text

resultBox.style.display="block"

status.textContent="تم إنشاء الإعلان"

credits--

localStorage.setItem("credits",credits)

updateCredits()

}catch(e){

status.textContent="حدث خطأ بالاتصال بالسيرفر"

}

}

</script>

</body>

</div>
