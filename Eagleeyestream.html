<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>

function loadPlaylist(){

let url = document.getElementById("playlist").value

let proxy = "https://muddy-lab-a457.maq9801.workers.dev/?url=" + encodeURIComponent(url)

fetch(proxy)
.then(res=>res.text())
.then(data=>{

let lines = data.split("\n")

let stream = lines.find(line => line.startsWith("http"))

let video = document.getElementById("player")

if(Hls.isSupported()){

let hls = new Hls()

hls.loadSource(stream)

hls.attachMedia(video)

}

})

}

</script>
